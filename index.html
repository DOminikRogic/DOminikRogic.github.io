<script>
    window.setInterval(function() {
        calculateStardate();
      }, 1000);
    function calculateStardate() {
        var today = new Date();
        var year = today.getFullYear();
        var month = today.getMonth() + 1;
        var day = today.getDate();
        var hours = today.getHours();
        var minutes = today.getMinutes();
        var seconds = today.getSeconds();
        
        var totalSeconds = (hours * 3600) + (minutes * 60) + seconds;
        var totalMinutes = (day * 1440) + (totalSeconds / 60);
        var totalDays = (365.25 * (year - 2005)) + ((month - 1) * 30) + day;
        var stardate = Math.round((totalDays + (totalMinutes / 1440)) * 100) / 100;
        
        console.log('Stardate:', stardate); // add this line
        document.getElementById("stardate").textContent = stardate;
    }
